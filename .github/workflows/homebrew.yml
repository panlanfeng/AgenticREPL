name: Update Homebrew Tap

on:
  push:
    tags: ['v*']

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Compute SHA256 and update tap
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          TARBALL="https://github.com/${{ github.repository }}/archive/refs/tags/${VERSION}.tar.gz"
          SHA256=$(curl -sL "$TARBALL" | sha256sum | cut -d' ' -f1)

          git clone https://${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/panlanfeng/homebrew-agenticrepl.git tap
          cd tap
          sed -i "s/version \".*\"/version \"$VERSION\"/" agenticrepl.rb
          sed -i "s/sha256 \".*\"/sha256 \"$SHA256\"/" agenticrepl.rb
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git commit -am "$VERSION" && git push
